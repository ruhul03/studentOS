spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/studentos?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:salman7?}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
      keepalive-time: 30000
      idle-timeout: 60000
      max-lifetime: 1800000
      connection-timeout: 30000
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your.email@gmail.com}
    password: ${MAIL_PASSWORD:your_google_app_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:thisIsAVeryLongAndSecureDevelopmentSecretKeyForStudentOS12345!@#}

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5174}

server:
  port: 8081
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate
